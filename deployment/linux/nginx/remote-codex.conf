# Remote Codex 的唯一公网入口。请将该文件作为 Nginx vhost 使用，不要保留 root、index、
# rewrite、通用 proxy 或额外 location。证书路径和 server_name 必须替换为实际部署值。
server {
    listen 443 ssl http2;
    server_name remote-codex.zergzerg.cn;

    ssl_certificate     /www/server/panel/vhost/cert/remote-codex.zergzerg.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/remote-codex.zergzerg.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;
    ssl_session_cache shared:REMOTE_CODEX_SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    server_tokens off;

    # 上游 Node listener 的 16 KiB 头部限制是最终边界；此处提前限制大 header。
    client_header_buffer_size 1k;
    large_client_header_buffers 2 8k;
    client_max_body_size 1k;

    access_log /www/wwwlogs/remote-codex.zergzerg.cn.log combined;
    error_log  /www/wwwlogs/remote-codex.zergzerg.cn.error.log warn;

    # Node 进程只在 loopback 上提供 TLS。使用系统 CA bundle 校验 loopback TLS 证书；
    # 在非 Debian 系统上将该路径替换为本机受信 CA bundle。
    proxy_ssl_server_name on;
    proxy_ssl_name remote-codex.zergzerg.cn;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 2;
    proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    proxy_ssl_protocols TLSv1.3;

    location = /health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For "";
        proxy_set_header Connection "";
        proxy_pass https://127.0.0.1:8443;
    }

    location = /tunnel {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 覆盖客户端提供的 header；不得追加客户端给出的地址链。
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_pass https://127.0.0.1:8443;
    }

    location / {
        return 404;
    }
}
